
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MboteEat - Street Food Kinshasa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      background-color: #ffffff;
      transition: background-color 0.5s ease, color 0.5s ease;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    input::placeholder {
      font-weight: 500;
      opacity: 0.4;
      color: #000;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.1em;
    }
    .leaflet-container {
      width: 100%;
      height: 100%;
      z-index: 1;
      transition: filter 0.5s ease;
    }
    .leaflet-control-attribution {
      display: none;
    }
    
    @keyframes ring {
      0% { transform: rotate(0); }
      10% { transform: rotate(15deg); }
      20% { transform: rotate(-15deg); }
      30% { transform: rotate(10deg); }
      40% { transform: rotate(-10deg); }
      50% { transform: rotate(0); }
      100% { transform: rotate(0); }
    }
    .animate-ring {
      animation: ring 2s ease infinite;
    }

    @keyframes notification-flow {
      0% { transform: translateY(-150%); opacity: 0; }
      15% { transform: translateY(0); opacity: 1; }
      85% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-150%); opacity: 0; }
    }
    .animate-notification {
      animation: notification-flow 5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes stars-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    .animate-stars-pop {
      animation: stars-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* --- STYLE FOOTER NAV TRANSFORMÉ --- */
    .footer-nav {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        height: 65px;
        background-color: #121212; /* Noir mat pro */
        display: flex;
        justify-content: space-around;
        align-items: center;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        z-index: 2000;
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.05); /* Bordure très fine */
        border-top-left-radius:35px;
        border-top-right-radius:35px;
        border-bottom-left-radius:35px;
        border-bottom-right-radius:35px;
    }
.footer-nav button{
  line-height:40px;
  transform:translateY(-20px);
  -webkit-transform:translateY(-15px);
  -moz-transform:translateY(-15px);
  -ms-transform:translateY(-15px);
  -o-transform:translateY(-15px);
}
.footer-nav button:hover{
  transform:translateY(-25px);
  transition:.8s ease;
}
.footer-nav button:hover span{
  display:block;
  transition:.8s ease;
}
.footer-nav button #History,.footer-nav button #userIcon{
  background: #FFCC00;

        width: 55px;
        height: 55px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: -30px; /* Dépassement stylé */
        border: 5px solid #000; /* Contour de détachement */
        box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
}
.footer-nav button span{
  display:none;
}
    /* Cache la barre avec effet de glissement */
    .footer-nav.hidden {
        transform: translate(-50%, 150%); /* Elle glisse vers le bas */
        opacity: 0;
        pointer-events: none;
    }

    .nav-active-glow {
        filter: drop-shadow(0 0 8px rgba(255, 204, 0, 0.8));
    }

    /* Le bouton central Jaune (Carte) */
    .map-center-btn {
        background: #FFCC00;
        width: 55px;
        height: 55px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: -30px; /* Dépassement stylé */
        border: 5px solid #000; /* Contour de détachement */
        box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .map-center-btn:active {
        transform: scale(0.9) translateY(2px);
    }

    /* --- STYLES MODE NUIT --- */
    body.mode-nuit {
      background-color: #020617; 
      color: #ffffff;
    }
    
    body.mode-nuit .leaflet-container {
      filter: brightness(0.7) contrast(1.2) grayscale(0.2);
    }

    body.mode-nuit .bg-white,
    body.mode-nuit .bg-gray-50,
    body.mode-nuit .bg-gray-100,
    body.mode-nuit .profile-card > div,
    body.mode-nuit .bg-white\/95 {
      background-color: #0f172a !important;
      border: 1px solid #1e293b !important;
      color: #ffffff !important;
    }

    body.mode-nuit .bg-yellow-400,
    body.mode-nuit button.bg-yellow-400,
    body.mode-nuit .w-10.h-10.bg-yellow-400 {
      background: linear-gradient(135deg, #ffcc00, #ff9900) !important;
      box-shadow: 0 0 20px rgba(255, 204, 0, 0.3) !important;
      color: #000000 !important;
    }

    body.mode-nuit h1, 
    body.mode-nuit h2, 
    body.mode-nuit h3,
    body.mode-nuit .text-black {
      color: #ffffff !important;
    }

    body.mode-nuit .quantity-selector .text-black {
      color: #FFCC00 !important;
    }

    body.mode-nuit .text-gray-400,
    body.mode-nuit .text-gray-500,
    body.mode-nuit .text-gray-900,
    body.mode-nuit p.text-gray-400,
    body.mode-nuit .text-white\/40 {
      color: #cbd5e1 !important;
    }
  </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="importmap">
  {
    "imports": {
      "react/": "https://esm.sh/react@^19.2.3/",

      "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    }
  }
  </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
